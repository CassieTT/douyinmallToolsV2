<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音电商品牌资产搜索框自适应模板</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="tool-shell">
      <header class="tool-header">
        <a class="brand-link" href="./index.html" aria-label="抖音商城">
          <img src="./assets/logo.png" alt="抖音商城" />
        </a>
      </header>

      <section class="workspace" aria-label="搜索框自适应生成器">
        <form class="controls" id="searchForm" novalidate>
          <div class="control-block">
            <label for="searchText">搜索词</label>
            <input id="searchText" name="searchText" type="text" autocomplete="off" value="品牌官方旗舰店" />
            <p class="error-message" id="errorMessage" role="alert"></p>
            <div class="mode-switch" id="modeSwitch" hidden>
              <div class="mode-buttons" role="group" aria-label="搜索框版本">
                <button class="mode-button active" type="button" data-mode="default">默认搜索框</button>
                <button class="mode-button" type="button" data-mode="long">长版搜索框</button>
              </div>
            </div>
          </div>

          <div class="advanced-config" aria-hidden="true">
            <div class="control-block">
              <label for="ratioInput">文字宽度比例</label>
              <input id="ratioInput" name="ratioInput" type="number" min="0.1" max="1" step="0.01" value="1.0" />
            </div>

            <div class="control-block">
              <label for="fontPath">字体文件路径</label>
              <input id="fontPath" name="fontPath" type="text" value="./assets/fonts/DouyinMeihaoBold.otf" />
            </div>
          </div>

          <div class="advanced-config" aria-hidden="true">
            <div class="control-block">
              <label for="templatePath">搜索框模板 SVG</label>
              <input id="templatePath" name="templatePath" type="text" value="./assets/svg/search-box-adaptive-template.svg" />
            </div>

            <div class="control-block">
              <label for="fontUpload">导入字体文件</label>
              <input id="fontUpload" name="fontUpload" type="file" accept=".woff,.woff2,.ttf,.otf,font/*" />
            </div>
          </div>

          <div class="advanced-config" aria-hidden="true">
            <div class="control-block">
              <label for="templateUpload">导入 SVG 模板</label>
              <input id="templateUpload" name="templateUpload" type="file" accept=".svg,image/svg+xml" />
            </div>

            <div class="metrics" aria-live="polite">
              <span>最大宽度 <strong id="targetWidthValue">0</strong></span>
              <span>固定字号 <strong id="fontSizeValue">0</strong></span>
              <span>容器 <strong id="containerWidthValue">0</strong></span>
            </div>
          </div>

          <div class="actions">
            <button class="primary-button" type="button" id="downloadSvg">导出 SVG</button>
            <button type="button" id="downloadPng">导出 PNG</button>
            <button type="button" id="downloadJpg">导出 JPG</button>
            <button class="advanced-config" type="button" id="reloadTemplate" aria-hidden="true">重新载入模板</button>
          </div>
        </form>
